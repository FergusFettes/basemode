name: Refresh verified models table

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync deps
        run: uv sync --all-groups

      - name: Regenerate verified model table
        run: uv run python scripts/generate_verified_models_table.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(models): refresh verified models table"
          branch: "chore/refresh-verified-models"
          title: "chore(models): refresh verified models table"
          body: |
            Automated refresh of:
            - README verified model table
            - data/verified_models_details.json
          labels: documentation
